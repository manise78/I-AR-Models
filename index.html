<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Visualizzatore AR Inventor</title>

<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

<style>
body {
    margin: 0;
    font-family: sans-serif;
    background: #f2f2f2;
}

model-viewer {
    width: 100%;
    height: 100vh;
    background-color: #ffffff;
}

#loader {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 18px;
    font-weight: bold;
}

.ar-button {
    background-color: #007bff;
    border-radius: 8px;
    border: none;
    color: white;
    padding: 12px 24px;
    position: absolute;
    bottom: 120px; /* solleva il pulsante */
    left: 50%;
    transform: translateX(-50%);
    font-weight: bold;
    z-index: 10;
}
</style>
</head>

<body>

<div id="loader">Caricamento modello 3D...</div>

<model-viewer id="viewer"
    src=""
    ar
    ar-modes="webxr scene-viewer quick-look"
    ar-placement="floor"
    camera-controls
    auto-rotate
    shadow-intensity="1"
    bounds="tight"
    rotation="90deg 0deg 0deg"  <!-- forza modello in piedi -->
    camera-orbit="0deg 75deg auto"
    alt="Modello 3D Inventor">

    <button slot="ar-button" class="ar-button">
        VEDI IN REALTÀ AUMENTATA
    </button>

</model-viewer>

<script>
(async function() {

    const viewer = document.getElementById('viewer');
    const loader = document.getElementById('loader');
    const params = new URLSearchParams(window.location.search);
    const fileName = params.get('file');

    if (!fileName) {
        alert("Nessun modello specificato.");
        return;
    }

    const baseUrl = "https://manise78.github.io/I-AR-Models/";
    const modelUrl = baseUrl + fileName;

    viewer.src = modelUrl;

    viewer.addEventListener('load', () => {
        console.log("Modello caricato:", modelUrl);
        viewer.updateFraming();
        loader.style.display = "none";
    });

    viewer.addEventListener('error', () => {
        alert("Errore caricamento modello 3D:\n" + modelUrl);
        loader.style.display = "none";
    });

})();
</script>

</body>
</html>
