<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Visualizzatore AR Inventor</title>

<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

<style>
body {
    margin: 0;
    font-family: sans-serif;
    background: #f2f2f2;
}

model-viewer {
    width: 100%;
    height: 100vh;
    background-color: #ffffff;
}

#loader {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 18px;
    font-weight: bold;
}

.ar-button {
    background-color: #0078D7;
    border-radius: 10px;
    border: none;
    color: white;
    padding: 14px 28px;
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    font-weight: bold;
    font-size: 16px;
}
</style>
</head>

<body>

<div id="loader">Caricamento modello 3D...</div>

<model-viewer id="viewer"
    src=""
    ar
    ar-modes="webxr scene-viewer quick-look"
    ar-placement="floor"
    camera-controls
    auto-rotate
    shadow-intensity="1"
    bounds="tight"
    alt="Modello 3D Inventor">

    <button slot="ar-button" class="ar-button">
        VEDI IN REALTÀ AUMENTATA
    </button>

</model-viewer>

<script>
(async function() {

    const viewer = document.getElementById('viewer');
    const loader = document.getElementById('loader');
    const params = new URLSearchParams(window.location.search);
    const fileName = params.get('file');

    if (!fileName) {
        loader.innerText = "Errore: nessun modello specificato.";
        return;
    }

    // 🔧 URL BASE — DEVE CORRISPONDERE AL TUO REPO
    const baseUrl = "https://manise78.github.io/I-AR-Models/";
    const modelUrl = baseUrl + fileName;

    // 🔁 Funzione retry per attendere GitHub Pages
    async function waitForModel(url, attempts = 15, delay = 2000) {
        for (let i = 0; i < attempts; i++) {
            try {
                const response = await fetch(url, { method: 'HEAD' });
                if (response.ok) return true;
            } catch (e) {}
            await new Promise(res => setTimeout(res, delay));
        }
        return false;
    }

    loader.innerText = "Verifica disponibilità modello...";

    const exists = await waitForModel(modelUrl);

    if (!exists) {
        loader.innerText = "Errore: modello non ancora disponibile su GitHub Pages.";
        return;
    }

    // 🚀 Carica il modello
    viewer.src = modelUrl;

    viewer.addEventListener('load', () => {
        loader.style.display = "none";
        viewer.updateFraming();
        console.log("Modello caricato:", modelUrl);
    });

    viewer.addEventListener('error', () => {
        loader.innerText = "Errore caricamento modello 3D.";
        console.error("Errore caricamento:", modelUrl);
    });

})();
</script>

</body>
</html>
